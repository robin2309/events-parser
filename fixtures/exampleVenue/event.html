<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spring Concert 2026 - Example Venue</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Event",
    "name": "Spring Concert 2026",
    "description": "Annual spring concert featuring local artists",
    "startDate": "2026-03-15T19:00:00-05:00",
    "endDate": "2026-03-15T22:00:00-05:00",
    "eventStatus": "https://schema.org/EventScheduled",
    "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
    "location": {
      "@type": "Place",
      "name": "Example Venue Hall",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Main Street",
        "addressLocality": "Springfield",
        "addressRegion": "IL",
        "postalCode": "62701",
        "addressCountry": "US"
      }
    },
    "image": "https://example-venue.com/images/spring-concert-2026.jpg",
    "url": "https://example-venue.com/events/spring-concert-2026"
  }
  </script>
</head>
<body>
  <article class="event-detail">
    <h1>Spring Concert 2026</h1>

    <img src="/images/spring-concert-2026.jpg" alt="Spring Concert 2026">

    <div class="event-info">
      <p class="date">March 15, 2026 at 7:00 PM</p>
      <p class="location">Example Venue Hall</p>
      <p class="description">
        Annual spring concert featuring local artists from the Springfield area.
        Join us for an evening of music and entertainment.
      </p>
    </div>
  </article>
</body>
</html>
